version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: app_dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_MEALDB_API_URL=https://www.themealdb.com/api/json/v1/1
      - NEXT_PUBLIC_MEALDB_IMAGE_URL=https://www.themealdb.com/images/ingredients
    restart: unless-stopped
